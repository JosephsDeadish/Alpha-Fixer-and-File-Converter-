<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Zombie Apocalypse: dark green graveyard, zombie hands, dripping text -->
  <defs>
    <radialGradient id="sky_z" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a10"/>
      <stop offset="100%" stop-color="#0a0f06"/>
    </radialGradient>
    <radialGradient id="moon_z" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88aa44"/>
      <stop offset="100%" stop-color="#445522"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#sky_z)"/>

  <!-- Eerie moon -->
  <circle cx="320" cy="45" r="26" fill="url(#moon_z)" opacity="0.85"/>
  <circle cx="320" cy="45" r="26" fill="none" stroke="#557733" stroke-width="2">
    <animate attributeName="r" values="26;28;26" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.6;1" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Gravestones -->
  <rect x="30" y="140" width="28" height="44" rx="14" ry="14" fill="#2a3a1a" stroke="#446622" stroke-width="1.5"/>
  <rect x="30" y="156" width="28" height="28" rx="0" fill="#2a3a1a"/>
  <text x="44" y="155" fill="#88aa44" font-size="9" text-anchor="middle" font-family="serif">RIP</text>

  <rect x="80" y="130" width="24" height="52" rx="12" ry="12" fill="#263518" stroke="#446622" stroke-width="1.5"/>
  <rect x="80" y="148" width="24" height="34" rx="0" fill="#263518"/>
  <text x="92" y="145" fill="#88aa44" font-size="8" text-anchor="middle" font-family="serif">RIP</text>

  <rect x="320" y="148" width="22" height="46" rx="11" ry="11" fill="#2a3a1a" stroke="#446622" stroke-width="1.5"/>
  <rect x="320" y="164" width="22" height="30" rx="0" fill="#2a3a1a"/>
  <text x="331" y="160" fill="#88aa44" font-size="7" text-anchor="middle" font-family="serif">RIP</text>

  <rect x="355" y="138" width="26" height="50" rx="13" ry="13" fill="#263518" stroke="#446622" stroke-width="1.5"/>
  <rect x="355" y="157" width="26" height="31" rx="0" fill="#263518"/>
  <text x="368" y="153" fill="#88aa44" font-size="8" text-anchor="middle" font-family="serif">RIP</text>

  <!-- Ground / grass -->
  <rect x="0" y="183" width="400" height="37" fill="#1a2a10"/>
  <!-- Tufts of dead grass -->
  <line x1="20" y1="183" x2="15" y2="170" stroke="#446622" stroke-width="2"/>
  <line x1="25" y1="183" x2="28" y2="168" stroke="#3a5a1a" stroke-width="1.5"/>
  <line x1="120" y1="183" x2="115" y2="172" stroke="#446622" stroke-width="2"/>
  <line x1="200" y1="183" x2="204" y2="169" stroke="#3a5a1a" stroke-width="1.5"/>
  <line x1="270" y1="183" x2="265" y2="170" stroke="#446622" stroke-width="2"/>
  <line x1="380" y1="183" x2="384" y2="172" stroke="#3a5a1a" stroke-width="1.5"/>

  <!-- Zombie hand 1 — rising from ground -->
  <g transform="translate(155,160)">
    <rect x="-8" y="-20" width="16" height="40" rx="5" fill="#556633" stroke="#3a4a22" stroke-width="1"/>
    <!-- fingers -->
    <rect x="-8" y="-40" width="5" height="22" rx="2.5" fill="#556633" stroke="#3a4a22" stroke-width="1"/>
    <rect x="-2" y="-44" width="5" height="26" rx="2.5" fill="#556633" stroke="#3a4a22" stroke-width="1"/>
    <rect x="4"  y="-41" width="5" height="24" rx="2.5" fill="#556633" stroke="#3a4a22" stroke-width="1"/>
    <rect x="-14" y="-34" width="7" height="18" rx="3"   fill="#556633" stroke="#3a4a22" stroke-width="1"/>
    <animateTransform attributeName="transform" type="translate" values="155,165;155,155;155,165" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Zombie hand 2 -->
  <g transform="translate(235,165)">
    <rect x="-7" y="-18" width="14" height="36" rx="5" fill="#4a5c2a" stroke="#3a4a22" stroke-width="1"/>
    <rect x="-7" y="-37" width="5" height="21" rx="2.5" fill="#4a5c2a" stroke="#3a4a22" stroke-width="1"/>
    <rect x="-1" y="-41" width="5" height="25" rx="2.5" fill="#4a5c2a" stroke="#3a4a22" stroke-width="1"/>
    <rect x="5"  y="-38" width="5" height="22" rx="2.5" fill="#4a5c2a" stroke="#3a4a22" stroke-width="1"/>
    <animateTransform attributeName="transform" type="translate" values="235,170;235,158;235,170" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Blood drips from top -->
  <ellipse cx="100" cy="0" rx="3" ry="14" fill="#660000" opacity="0.8">
    <animate attributeName="ry" values="0;16;0" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="0;22;0" dur="2.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="280" cy="0" rx="3" ry="12" fill="#660000" opacity="0.8">
    <animate attributeName="ry" values="0;14;0" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="0;20;0" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Fireflies / spores -->
  <circle cx="60" cy="100" r="2" fill="#88ff44" opacity="0.7">
    <animate attributeName="cx" values="60;75;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;85;100" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="90" r="2" fill="#88ff44" opacity="0.7">
    <animate attributeName="cx" values="300;315;300" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="90;75;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
