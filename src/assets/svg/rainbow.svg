<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#ff0000"/>
      <stop offset="16%"  style="stop-color:#ff8800"/>
      <stop offset="33%"  style="stop-color:#ffff00"/>
      <stop offset="50%"  style="stop-color:#00ff00"/>
      <stop offset="66%"  style="stop-color:#0088ff"/>
      <stop offset="83%"  style="stop-color:#8800ff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="#ff00ff" rx="8">
    <animate attributeName="fill"
      values="#ff00ff;#ff0088;#ff00ff" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Rainbow circle (rotating) -->
  <circle cx="32" cy="32" r="26" fill="url(#rainbow)" opacity="0.85">
    <animateTransform attributeName="transform" type="rotate"
      values="0 32 32; 360 32 32" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.7;0.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Unicorn emoji (bobbing up and down) -->
  <text x="32" y="38" text-anchor="middle" font-size="18" fill="white">🦄
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-3; 0,0" dur="1.5s" repeatCount="indefinite"/>
  </text>
  <!-- Sparkle dots -->
  <circle cx="8"  cy="8"  r="3" fill="#ffff00" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="8"  r="2.5" fill="#ff0000" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8"  cy="56" r="2.5" fill="#00ff00" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="56" r="3" fill="#0088ff" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>
