<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background deep forest dark -->
  <rect width="100" height="100" fill="#020a04"/>

  <!-- Moon glow through trees -->
  <circle cx="50" cy="22" r="14" fill="#aaffcc" opacity="0.08">
    <animate attributeName="opacity" values="0.08;0.16;0.08" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="14;17;14" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="22" r="8" fill="#ddfff0" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Tree silhouettes (tall dark triangles) -->
  <!-- Left cluster -->
  <polygon points="0,100 12,40 24,100" fill="#020a04"/>
  <polygon points="8,100 18,55 28,100" fill="#031205"/>
  <!-- Centre-left -->
  <polygon points="22,100 32,45 42,100" fill="#020a04"/>
  <!-- Centre gap (open to sky/moon) -->
  <!-- Centre-right -->
  <polygon points="58,100 68,48 78,100" fill="#020a04"/>
  <!-- Right cluster -->
  <polygon points="72,100 82,52 92,100" fill="#031205"/>
  <polygon points="80,100 90,42 100,100" fill="#020a04"/>

  <!-- Tree trunk dark overlays -->
  <rect x="10" y="70" width="4" height="30" fill="#010703"/>
  <rect x="30" y="68" width="4" height="32" fill="#010703"/>
  <rect x="66" y="70" width="4" height="30" fill="#010703"/>
  <rect x="84" y="72" width="4" height="28" fill="#010703"/>

  <!-- Undergrowth silhouette -->
  <ellipse cx="20" cy="98" rx="16" ry="8" fill="#031205" opacity="0.9"/>
  <ellipse cx="75" cy="99" rx="18" ry="7" fill="#031205" opacity="0.9"/>

  <!-- Fireflies (floating glowing dots) -->
  <circle cx="38" cy="62" r="1.4" fill="#44ff88" opacity="0.9">
    <animate attributeName="cx" values="38;42;38;34;38" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="62;58;55;60;62" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.1;0.9;0.1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="68" r="1.2" fill="#66ffaa" opacity="0.8">
    <animate attributeName="cx" values="55;51;55;59;55" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="68;72;65;70;68" dur="7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.1;0.8;0.1;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="46" cy="50" r="1.1" fill="#44ff88" opacity="0.85">
    <animate attributeName="cx" values="46;50;46;42;46" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="50;46;52;48;50" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.1;0.85;0.1;0.85" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="62" cy="55" r="1" fill="#88ffcc" opacity="0.75">
    <animate attributeName="cx" values="62;58;64;60;62" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;59;52;57;55" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.1;0.75;0.1;0.75" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="75" r="0.9" fill="#44ff88" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7;0.1;0.7" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="80" r="1" fill="#66ffaa" opacity="0.65">
    <animate attributeName="opacity" values="0.65;0.1;0.65;0.1;0.65" dur="1.9s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars glimpsed between treetops -->
  <circle cx="50" cy="10" r="0.8" fill="#aaffcc">
    <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="15" r="0.6" fill="#ccffe8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="13" r="0.7" fill="#aaffcc">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
