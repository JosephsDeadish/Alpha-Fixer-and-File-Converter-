<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0a0a1a" rx="8"/>

  <!-- Crescent moon with glow -->
  <circle cx="50" cy="14" r="9" fill="#2a1a4a">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="54" cy="12" r="7" fill="#0a0a1a"/>

  <!-- Bat – left wing flapping -->
  <g transform-origin="32 29">
    <!-- Left wing -->
    <path d="M32,29 C26,25 14,24 8,18 C10,27 20,31 26,28" fill="#7b2dff">
      <animate attributeName="d"
        values="M32,29 C26,25 14,24 8,18 C10,27 20,31 26,28;
                M32,29 C26,22 14,20 8,15 C10,24 20,28 26,25;
                M32,29 C24,28 14,29 8,24 C10,30 22,33 26,30;
                M32,29 C26,25 14,24 8,18 C10,27 20,31 26,28"
        dur="0.7s" repeatCount="indefinite"/>
    </path>
    <!-- Right wing -->
    <path d="M32,29 C38,25 50,24 56,18 C54,27 44,31 38,28" fill="#7b2dff">
      <animate attributeName="d"
        values="M32,29 C38,25 50,24 56,18 C54,27 44,31 38,28;
                M32,29 C38,22 50,20 56,15 C54,24 44,28 38,25;
                M32,29 C40,28 50,29 56,24 C54,30 42,33 38,30;
                M32,29 C38,25 50,24 56,18 C54,27 44,31 38,28"
        dur="0.7s" repeatCount="indefinite"/>
    </path>
    <!-- Bat body -->
    <ellipse cx="32" cy="30" rx="5" ry="6" fill="#7b2dff"/>
    <!-- Bat head -->
    <circle cx="32" cy="25" r="5" fill="#7b2dff"/>
    <!-- Bat ears -->
    <polygon points="28,22 25,15 31,20" fill="#7b2dff"/>
    <polygon points="36,22 39,15 33,20" fill="#7b2dff"/>
    <!-- Eyes glow with blink -->
    <ellipse cx="30" cy="25" rx="1.5" ry="1.5" fill="#ddddf0">
      <animate attributeName="ry" values="1.5;1.5;0;1.5;1.5" keyTimes="0;0.75;0.82;0.9;1" dur="4s" begin="0.8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="34" cy="25" rx="1.5" ry="1.5" fill="#ddddf0">
      <animate attributeName="ry" values="1.5;1.5;0;1.5;1.5" keyTimes="0;0.75;0.82;0.9;1" dur="4s" begin="0.8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Small bats flying in background -->
  <g opacity="0.5">
    <path d="M14,44 C12,42 8,42 6,40 C7,43 11,44 13,43" fill="#5a1aee">
      <animate attributeName="d"
        values="M14,44 C12,42 8,42 6,40 C7,43 11,44 13,43;
                M14,44 C12,41 8,41 6,39 C7,42 11,43 13,42;
                M14,44 C12,42 8,42 6,40 C7,43 11,44 13,43"
        dur="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M14,44 C16,42 20,42 22,40 C21,43 17,44 15,43" fill="#5a1aee">
      <animate attributeName="d"
        values="M14,44 C16,42 20,42 22,40 C21,43 17,44 15,43;
                M14,44 C16,41 20,41 22,39 C21,42 17,43 15,42;
                M14,44 C16,42 20,42 22,40 C21,43 17,44 15,43"
        dur="0.5s" repeatCount="indefinite"/>
    </path>
    <!-- Small bat floating up -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-18" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0" dur="4s" repeatCount="indefinite"/>
      <path d="M50,52 C48,50 44,50 42,48 C43,51 47,52 49,51" fill="#5a1aee"/>
      <path d="M50,52 C52,50 56,50 58,48 C57,51 53,52 51,51" fill="#5a1aee"/>
    </g>
  </g>
</svg>
