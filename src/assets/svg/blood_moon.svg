<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background sky -->
  <rect width="100" height="100" fill="#110005"/>

  <!-- Glow pulse behind the moon -->
  <circle cx="50" cy="38" r="30" fill="none" stroke="#cc1133" stroke-width="6" opacity="0.2">
    <animate attributeName="r" values="30;35;30" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.45;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Blood moon body -->
  <circle cx="50" cy="38" r="22" fill="#aa1122">
    <animate attributeName="fill" values="#aa1122;#cc2233;#aa1122" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Dark shadow crescent for depth -->
  <circle cx="58" cy="34" r="18" fill="#220008" opacity="0.6"/>

  <!-- Craters -->
  <circle cx="44" cy="34" r="3.5" fill="#881118" opacity="0.7"/>
  <circle cx="55" cy="44" r="2.5" fill="#881118" opacity="0.6"/>
  <circle cx="42" cy="46" r="2" fill="#881118" opacity="0.5"/>

  <!-- Dripping blood drops -->
  <ellipse cx="48" cy="64" rx="2.5" ry="3.5" fill="#cc1133" opacity="0.9">
    <animate attributeName="cy" values="64;72;64" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="53" cy="68" rx="2" ry="3" fill="#dd2244" opacity="0.8">
    <animate attributeName="cy" values="68;76;68" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="2.2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="44" cy="70" rx="1.5" ry="2.5" fill="#cc1133" opacity="0.75">
    <animate attributeName="cy" values="70;79;70" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.1;0.75" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Stars twinkling -->
  <circle cx="15" cy="12" r="1.2" fill="#ffbbcc">
    <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="82" cy="20" r="1" fill="#ffbbcc">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="25" cy="30" r="0.8" fill="#ffaaaa">
    <animate attributeName="opacity" values="1;0.1;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="10" r="1.1" fill="#ffccdd">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="90" cy="55" r="0.9" fill="#ffbbcc">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="70" r="1" fill="#ffaaaa">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
