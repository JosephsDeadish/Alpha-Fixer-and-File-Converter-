<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Toxic Neon: dark industrial bg, radioactive green neon, acid drips, warning signs -->
  <defs>
    <radialGradient id="bg_tn" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0a150a"/>
      <stop offset="100%" stop-color="#040804"/>
    </radialGradient>
    <radialGradient id="glow_tn" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ff44" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#004400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="barrel_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#aaff00" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#224400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg_tn)"/>

  <!-- Neon grid lines (industrial floor) -->
  <g stroke="#00aa22" stroke-width="0.5" opacity="0.25">
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="50"  y1="150" x2="50"  y2="220"/>
    <line x1="100" y1="150" x2="100" y2="220"/>
    <line x1="150" y1="150" x2="150" y2="220"/>
    <line x1="200" y1="150" x2="200" y2="220"/>
    <line x1="250" y1="150" x2="250" y2="220"/>
    <line x1="300" y1="150" x2="300" y2="220"/>
    <line x1="350" y1="150" x2="350" y2="220"/>
  </g>

  <!-- Toxic waste barrel 1 -->
  <g transform="translate(80,150)">
    <!-- Glow -->
    <ellipse cx="0" cy="10" rx="40" ry="30" fill="url(#barrel_glow)" opacity="0.5">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Barrel body -->
    <rect x="-22" y="-40" width="44" height="60" rx="6" fill="#1a2a0a" stroke="#33aa00" stroke-width="2"/>
    <!-- Barrel bands -->
    <rect x="-22" y="-25" width="44" height="6" rx="2" fill="#224400" stroke="#33aa00" stroke-width="1"/>
    <rect x="-22" y="5"   width="44" height="6" rx="2" fill="#224400" stroke="#33aa00" stroke-width="1"/>
    <!-- Biohazard / radioactive symbol -->
    <circle cx="0" cy="-5" r="12" fill="#004400" stroke="#00ff44" stroke-width="1.5"/>
    <text x="0" y="0" font-size="16" fill="#00ff44" text-anchor="middle" font-family="Arial">☢</text>
    <!-- Lid (top) -->
    <ellipse cx="0" cy="-40" rx="22" ry="6" fill="#224400" stroke="#33aa00" stroke-width="1.5"/>
    <!-- Dripping acid -->
    <ellipse cx="-8" cy="20" rx="3" ry="10" fill="#88ff00" opacity="0.8">
      <animate attributeName="ry" values="5;15;5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="20;28;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.5;0.9" dur="2s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="6"  cy="22" rx="2.5" ry="8" fill="#aaff00" opacity="0.7">
      <animate attributeName="ry" values="4;12;4" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="22;30;22" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Toxic waste barrel 2 (tipped over, spilling) -->
  <g transform="translate(300,158) rotate(90)">
    <rect x="-20" y="-22" width="44" height="44" rx="6" fill="#1a2a0a" stroke="#33aa00" stroke-width="2"/>
    <rect x="-20" y="-8"  width="44" height="6"  rx="2" fill="#224400" stroke="#33aa00" stroke-width="1"/>
    <rect x="-20" y="6"   width="44" height="6"  rx="2" fill="#224400" stroke="#33aa00" stroke-width="1"/>
    <circle cx="2" cy="0" r="10" fill="#004400" stroke="#00ff44" stroke-width="1"/>
    <text x="2" y="4" font-size="12" fill="#00ff44" text-anchor="middle" font-family="Arial">☢</text>
    <ellipse cx="24" cy="0" rx="6" ry="22" fill="#1a2a0a" stroke="#33aa00" stroke-width="1.5"/>
  </g>
  <!-- Acid pool from barrel 2 -->
  <ellipse cx="300" cy="205" rx="45" ry="12" fill="#44aa00" opacity="0.5">
    <animate attributeName="rx" values="40;50;40" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="300" cy="205" rx="30" ry="8"  fill="#88ff00" opacity="0.4">
    <animate attributeName="rx" values="25;35;25" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Neon warning sign -->
  <g transform="translate(195,90)">
    <!-- Triangle warning -->
    <polygon points="0,-40 35,20 -35,20" fill="none" stroke="#ffff00" stroke-width="2.5" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="0,-28 24,14 -24,14" fill="#0a0a00" opacity="0.7"/>
    <text x="0" y="12" font-size="22" fill="#ffff00" text-anchor="middle" font-family="Arial">!</text>
  </g>

  <!-- Floating neon particles / spores -->
  <circle cx="50"  cy="80"  r="2.5" fill="#00ff44" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="80;40;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="50;62;50" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="60"  r="2"   fill="#aaff00" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;20;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="70"  r="2.5" fill="#00ff44" opacity="0">
    <animate attributeName="opacity" values="0;0.85;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="70;30;70" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="100" r="2"   fill="#88ff00" opacity="0">
    <animate attributeName="opacity" values="0;0.75;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="100;55;100" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Neon scanline flicker -->
  <rect x="0" y="0" width="400" height="4" fill="#00ff44" opacity="0">
    <animate attributeName="y" values="0;220;0" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.06;0.06;0" dur="6s" repeatCount="indefinite"/>
  </rect>

  <!-- Floor glow -->
  <rect x="0" y="210" width="400" height="10" fill="#00aa22" opacity="0.2"/>
</svg>
