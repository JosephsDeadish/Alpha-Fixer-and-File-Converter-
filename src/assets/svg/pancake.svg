<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Plate -->
  <ellipse cx="50" cy="88" rx="40" ry="10" fill="#3d2200"/>
  <!-- Pancake stack layers (bottom to top) -->
  <ellipse cx="50" cy="82" rx="36" ry="8" fill="#994400"/>
  <ellipse cx="50" cy="75" rx="34" ry="7" fill="#c4600a"/>
  <ellipse cx="50" cy="68" rx="32" ry="6.5" fill="#d4860a"/>
  <ellipse cx="50" cy="62" rx="30" ry="6" fill="#e8a040"/>
  <!-- Animated syrup drips -->
  <path d="M30 62 Q28 72 27 82" stroke="#cc5500" stroke-width="4" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M30 62 Q28 68 27 72;M30 62 Q28 72 27 82;M30 62 Q28 72 27 82"
      dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M55 62 Q57 71 59 80" stroke="#cc5500" stroke-width="3.5" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M55 62 Q57 67 59 70;M55 62 Q57 71 59 80;M55 62 Q57 71 59 80"
      dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M70 64 Q72 72 74 80" stroke="#cc5500" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M70 64 Q72 69 74 72;M70 64 Q72 72 74 80;M70 64 Q72 72 74 80"
      dur="1.8s" repeatCount="indefinite"/>
  </path>
  <!-- Melting butter pat – spreads outward and flattens like it's melting -->
  <ellipse cx="50" cy="56" rx="8" ry="4" fill="#ffe066">
    <animate attributeName="rx" values="8;13;8" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="4;2;4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;57;56" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Butter melt pool spreading beneath -->
  <ellipse cx="50" cy="58" rx="5" ry="1.5" fill="#ffd040" opacity="0.5">
    <animate attributeName="rx" values="5;10;5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Heat wave wisps – wavy rising paths that wiggle left-right as they rise -->
  <!-- Left wisp -->
  <path d="M35 57 Q33 52 35 47 Q37 42 35 37" stroke="#ffecc0" stroke-width="2" fill="none" opacity="0" stroke-linecap="round">
    <animate attributeName="d"
      values="M35 57 Q33 52 35 47 Q37 42 35 37;
              M35 57 Q37 52 35 47 Q33 42 35 37;
              M35 57 Q33 52 35 47 Q37 42 35 37"
      dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;0.7;0.5;0.2;0" keyTimes="0;0.15;0.5;0.8;1" dur="2.2s" repeatCount="indefinite"/>
  </path>
  <!-- Centre wisp -->
  <path d="M50 55 Q48 50 50 45 Q52 40 50 35" stroke="#ffecc0" stroke-width="2" fill="none" opacity="0" stroke-linecap="round">
    <animate attributeName="d"
      values="M50 55 Q48 50 50 45 Q52 40 50 35;
              M50 55 Q52 50 50 45 Q48 40 50 35;
              M50 55 Q48 50 50 45 Q52 40 50 35"
      dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;0.7;0.5;0.2;0" keyTimes="0;0.15;0.5;0.8;1" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <!-- Right wisp -->
  <path d="M65 57 Q67 52 65 47 Q63 42 65 37" stroke="#ffecc0" stroke-width="2" fill="none" opacity="0" stroke-linecap="round">
    <animate attributeName="d"
      values="M65 57 Q67 52 65 47 Q63 42 65 37;
              M65 57 Q63 52 65 47 Q67 42 65 37;
              M65 57 Q67 52 65 47 Q63 42 65 37"
      dur="2s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;0.6;0.4;0.1;0" keyTimes="0;0.15;0.5;0.8;1" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </path>
</svg>
