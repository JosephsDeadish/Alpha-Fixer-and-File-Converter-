<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#1a0000" rx="8"/>
  <!-- Dripping blood drop (animated drip) -->
  <ellipse cx="32" cy="22" rx="12" ry="14" fill="#cc0000"/>
  <path d="M26,30 Q32,50 38,30" fill="#cc0000"/>
  <circle cx="32" cy="50" r="5" fill="#cc0000">
    <animate attributeName="cy" values="50;56;50" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="5;2;5" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="56" r="3" fill="#aa0000">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="58" r="2" fill="#aa0000">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.1s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Skull eyes glowing -->
  <circle cx="26" cy="18" r="3" fill="#1a0000"/>
  <circle cx="38" cy="18" r="3" fill="#1a0000"/>
  <!-- Red glow pupils -->
  <circle cx="26" cy="18" r="1.5" fill="#ff0000" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="38" cy="18" r="1.5" fill="#ff0000" opacity="0">
    <animate attributeName="opacity" values="0;0.9;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>

