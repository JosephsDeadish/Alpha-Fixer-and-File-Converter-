<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Noodle bowl background -->
  <ellipse cx="50" cy="70" rx="42" ry="18" fill="#2a1e00"/>
  <path d="M8 55 Q50 45 92 55 L88 70 Q50 80 12 70 Z" fill="#3d2d00"/>
  <!-- Animated wavy noodle strands -->
  <path d="M20 55 Q30 45 40 55 Q50 65 60 55 Q70 45 80 55" stroke="#ffdd44" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M20 55 Q30 45 40 55 Q50 65 60 55 Q70 45 80 55;
              M20 50 Q30 60 40 50 Q50 40 60 50 Q70 60 80 50;
              M20 55 Q30 45 40 55 Q50 65 60 55 Q70 45 80 55"
      dur="1.2s" repeatCount="indefinite"/>
  </path>
  <path d="M15 60 Q30 50 45 60 Q55 70 70 60 Q80 50 90 60" stroke="#ccaa44" stroke-width="2.5" fill="none" stroke-linecap="round">
    <animate attributeName="d"
      values="M15 60 Q30 50 45 60 Q55 70 70 60 Q80 50 90 60;
              M15 55 Q30 65 45 55 Q55 45 70 55 Q80 65 90 55;
              M15 60 Q30 50 45 60 Q55 70 70 60 Q80 50 90 60"
      dur="1.5s" repeatCount="indefinite"/>
  </path>
  <!-- Chopsticks -->
  <line x1="35" y1="20" x2="28" y2="65" stroke="#cc9944" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      values="0 35 20;5 35 20;0 35 20" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="45" y1="18" x2="52" y2="63" stroke="#cc9944" stroke-width="3" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate"
      values="0 45 18;-5 45 18;0 45 18" dur="2s" repeatCount="indefinite"/>
  </line>
  <!-- Steam wisps -->
  <path d="M40 25 Q38 20 40 15 Q42 10 40 5" stroke="#fff8cc" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round">
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M55 22 Q53 17 55 12 Q57 7 55 2" stroke="#fff8cc" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round">
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2.5s" repeatCount="indefinite"/>
  </path>
</svg>
