<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#03030f" rx="8"/>
  <!-- Stars twinkling -->
  <circle cx="12" cy="10" r="1.5" fill="#4477ff">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="8" r="1" fill="#ffffff">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.3s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="22" cy="6" r="1" fill="#4477ff">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="15" r="2" fill="#ffffff">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8" cy="40" r="1.5" fill="#4477ff">
    <animate attributeName="opacity" values="0.7;0.15;0.7" dur="2.4s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="45" r="1" fill="#ffffff">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.6s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <!-- Galaxy spiral (slow rotation) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="18s" repeatCount="indefinite"/>
    <circle cx="32" cy="32" r="22" fill="none" stroke="#4477ff" stroke-width="1" opacity="0.3"/>
    <circle cx="32" cy="32" r="15" fill="none" stroke="#4477ff" stroke-width="1.5" opacity="0.5"/>
    <polygon points="32,8 34,28 32,32 30,28" fill="#4477ff" opacity="0.6"/>
    <polygon points="56,32 36,34 32,32 36,30" fill="#4477ff" opacity="0.6"/>
  </g>
  <circle cx="32" cy="32" r="8" fill="#0d0d3a" stroke="#4477ff" stroke-width="2"/>
  <circle cx="32" cy="32" r="4" fill="#4477ff">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>
