<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Bubblegum: pastel pink background, floating bubbles, candy swirls -->
  <defs>
    <radialGradient id="bg_b" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffcce0"/>
      <stop offset="100%" stop-color="#f0a0c0"/>
    </radialGradient>
    <radialGradient id="bubble" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#ffbbdd" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff77aa" stop-opacity="0.3"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg_b)"/>

  <!-- Candy swirl 1 (lollipop) -->
  <circle cx="60" cy="80" r="36" fill="none" stroke="#ff88bb" stroke-width="12"/>
  <circle cx="60" cy="80" r="36" fill="none" stroke="#ffffff" stroke-width="6"
          stroke-dasharray="30,30" stroke-dashoffset="0">
    <animateTransform attributeName="transform" type="rotate" values="0,60,80;360,60,80" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="80" r="22" fill="#ff66aa"/>
  <circle cx="60" cy="80" r="22" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-dasharray="20,20">
    <animateTransform attributeName="transform" type="rotate" values="0,60,80;-360,60,80" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Stick -->
  <line x1="60" y1="116" x2="60" y2="200" stroke="#ff99cc" stroke-width="6" stroke-linecap="round"/>

  <!-- Candy swirl 2 (right side) -->
  <circle cx="340" cy="110" r="30" fill="none" stroke="#cc88ee" stroke-width="10"/>
  <circle cx="340" cy="110" r="30" fill="none" stroke="#ffffff" stroke-width="5"
          stroke-dasharray="24,24">
    <animateTransform attributeName="transform" type="rotate" values="0,340,110;360,340,110" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="340" cy="110" r="18" fill="#dd88ff"/>
  <line x1="340" y1="140" x2="340" y2="210" stroke="#cc88ee" stroke-width="5" stroke-linecap="round"/>

  <!-- Floating bubbles -->
  <circle cx="145" cy="155" r="20" fill="url(#bubble)" stroke="#ffaadd" stroke-width="1.5" opacity="0.85">
    <animate attributeName="cy" values="155;100;155" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.5;0.85" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="130" r="14" fill="url(#bubble)" stroke="#ffaadd" stroke-width="1.5" opacity="0.8">
    <animate attributeName="cy" values="130;75;130" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="160" r="18" fill="url(#bubble)" stroke="#ffaadd" stroke-width="1.5" opacity="0.85">
    <animate attributeName="cy" values="160;100;160" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;0.5;0.85" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="60" r="10" fill="url(#bubble)" stroke="#ffaadd" stroke-width="1" opacity="0.75">
    <animate attributeName="cy" values="60;20;60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0.3;0.75" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Tiny candy hearts -->
  <text x="120" y="110" font-size="18" opacity="0.8">
    🍬
    <animate attributeName="y" values="110;95;110" dur="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="220" y="90" font-size="16" opacity="0.7">
    💗
    <animate attributeName="y" values="90;75;90" dur="3s" repeatCount="indefinite"/>
  </text>
  <text x="290" y="60" font-size="14" opacity="0.7">
    🍭
    <animate attributeName="y" values="60;45;60" dur="3.8s" repeatCount="indefinite"/>
  </text>

  <!-- Ground: pastel grass / candy land floor -->
  <path d="M 0,190 Q 50,180 100,195 Q 150,210 200,190 Q 250,170 300,192 Q 350,210 400,190 L 400,220 L 0,220 Z" fill="#ff99cc" opacity="0.6"/>
  <path d="M 0,200 Q 50,190 100,205 Q 150,220 200,200 Q 250,180 300,202 Q 350,215 400,200 L 400,220 L 0,220 Z" fill="#ffbbdd" opacity="0.5"/>
</svg>
