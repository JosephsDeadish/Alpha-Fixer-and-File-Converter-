<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background dark sky -->
  <rect width="100" height="100" fill="#110a00"/>

  <!-- Gradient sky wash (orange horizon glow) -->
  <ellipse cx="50" cy="72" rx="60" ry="30" fill="#ff6600" opacity="0.12">
    <animate attributeName="opacity" values="0.12;0.22;0.12" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Setting sun disc -->
  <circle cx="50" cy="68" r="18" fill="#ff9944">
    <animate attributeName="fill" values="#ff9944;#ff6622;#ff9944" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="18;19.5;18" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Sun glow corona -->
  <circle cx="50" cy="68" r="26" fill="none" stroke="#ff8800" stroke-width="5" opacity="0.18">
    <animate attributeName="r" values="26;30;26" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.18;0.35;0.18" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Ocean horizon line -->
  <rect x="0" y="72" width="100" height="28" fill="#1a0c00" opacity="0.85"/>

  <!-- Water shimmer stripes -->
  <rect x="30" y="73" width="40" height="1.5" fill="#ff9944" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.6;0.35" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="width" values="40;50;40" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="30;25;30" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="35" y="77" width="30" height="1" fill="#ffcc66" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.45;0.25" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="38" y="81" width="24" height="0.8" fill="#ff9944" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Palm tree silhouette left -->
  <rect x="12" y="50" width="3" height="28" fill="#0a0600"/>
  <ellipse cx="13" cy="46" rx="10" ry="6" fill="#0a0600" transform="rotate(-15 13 46)"/>
  <ellipse cx="13" cy="44" rx="9" ry="5" fill="#0a0600" transform="rotate(10 13 44)"/>
  <ellipse cx="13" cy="43" rx="8" ry="4" fill="#0a0600" transform="rotate(-25 13 43)"/>

  <!-- Palm tree silhouette right -->
  <rect x="85" y="52" width="3" height="26" fill="#0a0600"/>
  <ellipse cx="86" cy="48" rx="10" ry="6" fill="#0a0600" transform="rotate(15 86 48)"/>
  <ellipse cx="86" cy="46" rx="9" ry="5" fill="#0a0600" transform="rotate(-10 86 46)"/>
  <ellipse cx="86" cy="45" rx="8" ry="4" fill="#0a0600" transform="rotate(22 86 45)"/>

  <!-- Star twinkles in upper sky -->
  <circle cx="20" cy="12" r="0.9" fill="#ffddaa">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="72" cy="8" r="1.1" fill="#ffeecc">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="18" r="0.8" fill="#ffddaa">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="88" cy="15" r="1" fill="#ffeecc">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="22" r="0.7" fill="#ffddaa">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" repeatCount="indefinite"/>
  </circle>
</svg>
