<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#030d1a" rx="8"/>
  <!-- Snowflake (slowly rotating) -->
  <g transform-origin="32 32">
    <animateTransform attributeName="transform" type="rotate"
      values="0 32 32; 360 32 32" dur="20s" repeatCount="indefinite"/>
    <line x1="32" y1="8" x2="32" y2="56" stroke="#44aaff" stroke-width="2"/>
    <line x1="8" y1="32" x2="56" y2="32" stroke="#44aaff" stroke-width="2"/>
    <line x1="14" y1="14" x2="50" y2="50" stroke="#44aaff" stroke-width="2"/>
    <line x1="50" y1="14" x2="14" y2="50" stroke="#44aaff" stroke-width="2"/>
    <!-- Branch details -->
    <line x1="26" y1="14" x2="32" y2="20" stroke="#44aaff" stroke-width="1.2"/>
    <line x1="38" y1="14" x2="32" y2="20" stroke="#44aaff" stroke-width="1.2"/>
    <line x1="26" y1="50" x2="32" y2="44" stroke="#44aaff" stroke-width="1.2"/>
    <line x1="38" y1="50" x2="32" y2="44" stroke="#44aaff" stroke-width="1.2"/>
  </g>
  <!-- Center gem (pulsing) -->
  <circle cx="32" cy="32" r="5" fill="#44aaff">
    <animate attributeName="r" values="5;6;5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Ice sparkles (twinkling) -->
  <circle cx="14" cy="14" r="2.5" fill="#e8f4ff">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="14" r="2" fill="#e8f4ff">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="1.6s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="14" cy="50" r="2" fill="#e8f4ff">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="2.5" fill="#e8f4ff">
    <animate attributeName="opacity" values="0.8;0.1;0.8" dur="1.9s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <!-- Falling snowflakes -->
  <circle cx="8" cy="4" r="1.5" fill="#aaddff" opacity="0.7">
    <animate attributeName="cy" values="4;64;4" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="48" cy="10" r="1" fill="#cceeFF" opacity="0.6">
    <animate attributeName="cy" values="10;64;10" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="0" r="1.2" fill="#aaddff" opacity="0.5">
    <animate attributeName="cy" values="0;64;0" dur="6s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="6s" begin="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
