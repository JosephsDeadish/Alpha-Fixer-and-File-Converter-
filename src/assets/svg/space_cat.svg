<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Space Cat: deep purple space bg, cat silhouette, stars, laser eyes -->
  <defs>
    <radialGradient id="sky_sc" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </radialGradient>
    <radialGradient id="planet_sc" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9955cc"/>
      <stop offset="100%" stop-color="#441166"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#sky_sc)"/>

  <!-- Stars (static) -->
  <circle cx="20"  cy="15"  r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="50"  cy="40"  r="1"   fill="#ddddff" opacity="0.8"/>
  <circle cx="90"  cy="20"  r="1.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="140" cy="35"  r="1"   fill="#ffffff" opacity="0.7"/>
  <circle cx="200" cy="10"  r="2"   fill="#ffffff" opacity="0.9"/>
  <circle cx="260" cy="25"  r="1"   fill="#ddddff" opacity="0.8"/>
  <circle cx="310" cy="15"  r="1.5" fill="#ffffff" opacity="0.85"/>
  <circle cx="350" cy="40"  r="1"   fill="#ffffff" opacity="0.75"/>
  <circle cx="385" cy="18"  r="1.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="30"  cy="75"  r="1"   fill="#ddddff" opacity="0.7"/>
  <circle cx="370" cy="85"  r="1"   fill="#ffffff" opacity="0.75"/>
  <circle cx="180" cy="60"  r="1"   fill="#ffffff" opacity="0.65"/>
  <circle cx="330" cy="65"  r="1.5" fill="#ccccff" opacity="0.8"/>

  <!-- Twinkling stars -->
  <circle cx="120" cy="55" r="2" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="50" r="1.5" fill="#aaffff">
    <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75"  cy="95" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Planet (background) -->
  <circle cx="340" cy="70" r="45" fill="url(#planet_sc)" opacity="0.75"/>
  <!-- Planet rings -->
  <ellipse cx="340" cy="70" rx="65" ry="15" fill="none" stroke="#cc99ee" stroke-width="4" opacity="0.5"/>
  <ellipse cx="340" cy="70" rx="65" ry="15" fill="none" stroke="#aa77cc" stroke-width="2" opacity="0.35"
           stroke-dasharray="40,20"/>

  <!-- Cat body (floating in space) -->
  <!-- Body -->
  <ellipse cx="185" cy="148" rx="55" ry="44" fill="#1a0a2e" stroke="#553388" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="185" cy="98" rx="42" ry="38" fill="#1a0a2e" stroke="#553388" stroke-width="1.5"/>
  <!-- Ears -->
  <polygon points="152,75 144,42 175,65" fill="#1a0a2e" stroke="#553388" stroke-width="1.5"/>
  <polygon points="218,75 226,42 196,65" fill="#1a0a2e" stroke="#553388" stroke-width="1.5"/>
  <!-- Inner ear -->
  <polygon points="156,72 151,50 172,66" fill="#331155" opacity="0.6"/>
  <polygon points="214,72 219,50 198,66" fill="#331155" opacity="0.6"/>

  <!-- Cat eyes (glowing laser) -->
  <ellipse cx="172" cy="95" rx="12" ry="10" fill="#220044"/>
  <ellipse cx="198" cy="95" rx="12" ry="10" fill="#220044"/>
  <!-- Iris -->
  <ellipse cx="172" cy="95" rx="7"  ry="9"  fill="#00ccff"/>
  <ellipse cx="198" cy="95" rx="7"  ry="9"  fill="#ff44ff"/>
  <!-- Pupil slit -->
  <rect x="170" y="88" width="4" height="14" rx="2" fill="#000011"/>
  <rect x="196" y="88" width="4" height="14" rx="2" fill="#000011"/>
  <!-- Eye glow -->
  <ellipse cx="172" cy="95" rx="12" ry="10" fill="none" stroke="#00ccff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="198" cy="95" rx="12" ry="10" fill="none" stroke="#ff44ff" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Laser beams from eyes -->
  <line x1="164" y1="95" x2="60"  y2="85" stroke="#00ccff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.9;0;0;0" dur="5s" repeatCount="indefinite"/>
  </line>
  <line x1="206" y1="95" x2="310" y2="85" stroke="#ff44ff" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;0.9;0;0" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- Whiskers -->
  <line x1="143" y1="108" x2="100" y2="100" stroke="#8855bb" stroke-width="1.5"/>
  <line x1="143" y1="113" x2="100" y2="115" stroke="#8855bb" stroke-width="1.5"/>
  <line x1="143" y1="118" x2="100" y2="128" stroke="#8855bb" stroke-width="1.5"/>
  <line x1="227" y1="108" x2="270" y2="100" stroke="#8855bb" stroke-width="1.5"/>
  <line x1="227" y1="113" x2="270" y2="115" stroke="#8855bb" stroke-width="1.5"/>
  <line x1="227" y1="118" x2="270" y2="128" stroke="#8855bb" stroke-width="1.5"/>

  <!-- Nose -->
  <polygon points="185,108 179,115 191,115" fill="#cc66aa"/>
  <!-- Mouth -->
  <path d="M 179,116 Q 185,124 191,116" fill="none" stroke="#8855bb" stroke-width="1.5"/>

  <!-- Tail curling in space -->
  <path d="M 230,175 Q 280,200 310,170 Q 330,150 305,135" stroke="#330066" stroke-width="14" fill="none" stroke-linecap="round"/>
  <path d="M 230,175 Q 280,200 310,170 Q 330,150 305,135" stroke="#1a0a2e" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Astronaut helmet outline (transparent dome over head) -->
  <ellipse cx="185" cy="96" rx="50" ry="46" fill="none" stroke="#7744aa" stroke-width="2" opacity="0.5"
           stroke-dasharray="8,6"/>

  <!-- Space sparkles -->
  <text x="20"  y="130" font-size="12" fill="#aaffff" opacity="0.7">✦<animate attributeName="opacity" values="0.7;0.1;0.7" dur="3s" repeatCount="indefinite"/></text>
  <text x="355" y="120" font-size="10" fill="#ff99ff" opacity="0.65">✦<animate attributeName="opacity" values="0.65;0.15;0.65" dur="2.5s" repeatCount="indefinite"/></text>
  <text x="100" y="185" font-size="8"  fill="#aaffff" opacity="0.6">✧<animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/></text>
</svg>
