<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background dark ice cave -->
  <rect width="100" height="100" fill="#0a1520"/>

  <!-- Ice stalactites from top -->
  <polygon points="18,0 22,28 14,28" fill="#88ccee" opacity="0.7"/>
  <polygon points="35,0 39,22 31,22" fill="#aaddff" opacity="0.65"/>
  <polygon points="55,0 58,18 52,18" fill="#88ccee" opacity="0.7"/>
  <polygon points="72,0 76,25 68,25" fill="#bbeeff" opacity="0.6"/>
  <polygon points="88,0 92,20 84,20" fill="#aaddff" opacity="0.65"/>

  <!-- Glowing ice crystal at center -->
  <polygon points="50,40 56,52 50,62 44,52" fill="#cceeff" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.5;0.85" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#cceeff;#88bbdd;#cceeff" dur="2s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="50,40 56,52 50,62 44,52" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>

  <!-- Inner crystal sparkle -->
  <circle cx="50" cy="51" r="4" fill="#ffffff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;5.5;4" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Smaller ice crystals -->
  <polygon points="22,65 26,73 22,80 18,73" fill="#aaddff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.35;0.7" dur="2.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="75,60 79,68 75,75 71,68" fill="#bbeeff" opacity="0.65">
    <animate attributeName="opacity" values="0.65;0.3;0.65" dur="1.8s" repeatCount="indefinite"/>
  </polygon>

  <!-- Snow/ice particles floating upward -->
  <circle cx="30" cy="90" r="1.5" fill="#cceeff" opacity="0.8">
    <animate attributeName="cy" values="90;10;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="85" r="1" fill="#ffffff" opacity="0.7">
    <animate attributeName="cy" values="85;5;85" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="95" r="1.2" fill="#cceeff" opacity="0.6">
    <animate attributeName="cy" values="95;20;95" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="78" cy="88" r="0.8" fill="#aaddff" opacity="0.75">
    <animate attributeName="cy" values="88;15;88" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;0;0.75" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Ambient cold glow -->
  <ellipse cx="50" cy="52" rx="28" ry="22" fill="none" stroke="#66aacc" stroke-width="1" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="28;32;28" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="22;26;22" dur="3s" repeatCount="indefinite"/>
  </ellipse>
</svg>
