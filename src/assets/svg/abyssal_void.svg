<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Abyssal Void: near-total darkness, eldritch tendrils, glowing void eye -->
  <defs>
    <radialGradient id="bg_av" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="eye_av" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc00ff"/>
      <stop offset="40%" stop-color="#6600cc"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="eye_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8800ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background — almost black -->
  <rect width="400" height="220" fill="url(#bg_av)"/>

  <!-- Void eye glow (background halo) -->
  <ellipse cx="200" cy="110" rx="100" ry="80" fill="url(#eye_glow)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="95;110;95" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="75;90;75" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Main void eye -->
  <ellipse cx="200" cy="110" rx="55" ry="40" fill="#000000" stroke="#6600cc" stroke-width="2"/>
  <!-- Eye iris -->
  <ellipse cx="200" cy="110" rx="38" ry="28" fill="url(#eye_av)">
    <animate attributeName="rx" values="38;42;38" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="28;32;28" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Slit pupil -->
  <ellipse cx="200" cy="110" rx="8"  ry="26" fill="#000000"/>
  <!-- Eye highlight / gleam -->
  <ellipse cx="210" cy="100" rx="8"  ry="5"  fill="#cc66ff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Outer ring -->
  <ellipse cx="200" cy="110" rx="55" ry="40" fill="none" stroke="#4400aa" stroke-width="1" stroke-dasharray="12,8">
    <animateTransform attributeName="transform" type="rotate" values="0,200,110;360,200,110" dur="12s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="200" cy="110" rx="65" ry="50" fill="none" stroke="#330088" stroke-width="0.8" stroke-dasharray="8,16" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0,200,110;-360,200,110" dur="18s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eldritch tendrils -->
  <path d="M 168,98  Q 100,60  50,80  Q 20,90  0,70"
        stroke="#330066" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
    <animate attributeName="d" values="M 168,98  Q 100,60  50,80  Q 20,90  0,70;M 165,102 Q 98,55  48,78  Q 18,88  0,68;M 168,98  Q 100,60  50,80  Q 20,90  0,70" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M 175,88  Q 130,30  110,15  Q 90,5   70,0"
        stroke="#220055" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <animate attributeName="d" values="M 175,88  Q 130,30  110,15  Q 90,5   70,0;M 178,85  Q 133,27  113,12  Q 93,2   73,0;M 175,88  Q 130,30  110,15  Q 90,5   70,0" dur="4s" repeatCount="indefinite"/>
  </path>
  <path d="M 232,98  Q 300,60  350,80  Q 380,90  400,70"
        stroke="#330066" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8">
    <animate attributeName="d" values="M 232,98  Q 300,60  350,80  Q 380,90  400,70;M 235,102 Q 303,55  353,77  Q 383,87  400,67;M 232,98  Q 300,60  350,80  Q 380,90  400,70" dur="3.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 225,88  Q 270,30  290,15  Q 310,5   330,0"
        stroke="#220055" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <animate attributeName="d" values="M 225,88  Q 270,30  290,15  Q 310,5   330,0;M 228,85  Q 273,27  293,12  Q 313,2   333,0;M 225,88  Q 270,30  290,15  Q 310,5   330,0" dur="4.5s" repeatCount="indefinite"/>
  </path>

  <!-- Bottom tendrils -->
  <path d="M 185,130 Q 140,175 100,200 Q 60,218  20,220"
        stroke="#330066" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 215,130 Q 260,175 300,200 Q 340,218 390,220"
        stroke="#330066" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 200,140 Q 200,185 200,220"
        stroke="#440088" stroke-width="3"   fill="none" opacity="0.6"/>

  <!-- Void particles -->
  <circle cx="80"  cy="45"  r="1.5" fill="#8800ff" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="3s"   repeatCount="indefinite"/>
    <animate attributeName="cy" values="45;25;45" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="55"  r="1.5" fill="#aa44ff" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="4s"   repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;35;55" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="145" cy="165" r="1.5" fill="#6600cc" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="165;145;165" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="160" r="1"   fill="#8800ff" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;140;160" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
