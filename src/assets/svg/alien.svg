<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="alienGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#003322" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="beamGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="80" r="90" fill="url(#alienGlow)"/>

  <!-- Stars (twinkling) -->
  <g fill="#00ff88" opacity="0.7">
    <circle cx="20" cy="25" r="2">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="35" r="2.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="160" r="1.8">
      <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="150" r="2">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="170" r="1.5">
      <animate attributeName="opacity" values="0.8;0.3;0.8" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- UFO group (hovering up and down) -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-8; 0,0" dur="2.8s" repeatCount="indefinite"/>

    <!-- UFO disc lower (metallic) -->
    <ellipse cx="100" cy="108" rx="52" ry="15" fill="#225533" opacity="0.9"/>
    <!-- UFO disc upper dome base -->
    <ellipse cx="100" cy="98" rx="48" ry="14" fill="#33aa44" opacity="0.95"/>
    <!-- Dome -->
    <path d="M65,98 Q65,65 100,62 Q135,65 135,98 Z" fill="#00ff88" opacity="0.7"/>
    <!-- Dome highlight -->
    <path d="M78,88 Q82,72 92,70 Q86,78 83,90 Z" fill="#aaffcc" opacity="0.5"/>
    <!-- UFO lights (rotating) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 100 108; 360 100 108" dur="3s" repeatCount="indefinite"/>
      <circle cx="100" cy="94" r="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="125" cy="102" r="3.5" fill="#00ff88" opacity="0.85"/>
      <circle cx="140" cy="112" r="3" fill="#ffffff" opacity="0.8"/>
      <circle cx="125" cy="118" r="3.5" fill="#00ff88" opacity="0.85"/>
      <circle cx="100" cy="122" r="4" fill="#ffffff" opacity="0.9"/>
      <circle cx="75" cy="118" r="3.5" fill="#00ff88" opacity="0.85"/>
      <circle cx="60" cy="112" r="3" fill="#ffffff" opacity="0.8"/>
      <circle cx="75" cy="102" r="3.5" fill="#00ff88" opacity="0.85"/>
    </g>
    <!-- Tractor beam -->
    <path d="M78,118 Q60,165 50,185 Q100,190 150,185 Q140,165 122,118 Z"
          fill="url(#beamGrad)" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <!-- Alien head (inside dome) -->
    <ellipse cx="100" cy="85" rx="14" ry="16" fill="#00cc44" opacity="0.95"/>
    <!-- Big eyes -->
    <ellipse cx="94" cy="82" rx="5" ry="6" fill="#111111" opacity="0.9"/>
    <ellipse cx="106" cy="82" rx="5" ry="6" fill="#111111" opacity="0.9"/>
    <circle cx="95" cy="81" r="2" fill="#ffffff" opacity="0.7"/>
    <circle cx="107" cy="81" r="2" fill="#ffffff" opacity="0.7"/>
    <!-- Antennae -->
    <line x1="94" y1="70" x2="88" y2="60" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="88" cy="60" r="3" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <line x1="106" y1="70" x2="112" y2="60" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="112" cy="60" r="3" fill="#00ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sparkle particles (abduction effect) -->
  <g fill="#00ff88" opacity="0.8">
    <circle cx="85" cy="155" r="3">
      <animate attributeName="cy" values="155;120" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="165" r="2.5">
      <animate attributeName="cy" values="165;130" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="115" cy="158" r="2">
      <animate attributeName="cy" values="158;125" dur="1.3s" begin="0.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.3s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
