<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background deep navy -->
  <rect width="100" height="100" fill="#030d18"/>

  <!-- Circuit board trace lines -->
  <polyline points="0,30 20,30 20,20 45,20" fill="none" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
  <polyline points="100,60 75,60 75,70 55,70" fill="none" stroke="#00ffcc" stroke-width="0.6" opacity="0.25"/>
  <polyline points="10,80 10,55 25,55 25,45 40,45" fill="none" stroke="#0066aa" stroke-width="0.5" opacity="0.3"/>
  <polyline points="90,20 90,40 80,40 80,55 65,55" fill="none" stroke="#0066aa" stroke-width="0.5" opacity="0.3"/>

  <!-- Circuit nodes (small squares) -->
  <rect x="19" y="19" width="2" height="2" fill="#00ffcc" opacity="0.5"/>
  <rect x="44" y="19" width="2" height="2" fill="#00ffcc" opacity="0.5"/>
  <rect x="74" y="59" width="2" height="2" fill="#00ffcc" opacity="0.5"/>
  <rect x="24" y="54" width="2" height="2" fill="#0099cc" opacity="0.5"/>

  <!-- Otter head silhouette (simplified) -->
  <ellipse cx="50" cy="46" rx="16" ry="14" fill="#071a2e"/>
  <ellipse cx="50" cy="46" rx="16" ry="14" fill="none" stroke="#00ffcc" stroke-width="1.2" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Otter ears -->
  <ellipse cx="37" cy="35" rx="5" ry="5" fill="#071a2e"/>
  <ellipse cx="37" cy="35" rx="5" ry="5" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.25;0.6" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="63" cy="35" rx="5" ry="5" fill="#071a2e"/>
  <ellipse cx="63" cy="35" rx="5" ry="5" fill="none" stroke="#00ffcc" stroke-width="1" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.25;0.6" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Cyber eyes — glowing -->
  <circle cx="44" cy="44" r="3" fill="#00ffcc" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3.8;3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="44" r="3" fill="#00ffcc" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;3.8;3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Pupil slits -->
  <ellipse cx="44" cy="44" rx="1" ry="2" fill="#030d18" opacity="0.9"/>
  <ellipse cx="56" cy="44" rx="1" ry="2" fill="#030d18" opacity="0.9"/>

  <!-- Cyber HUD ring around head -->
  <circle cx="50" cy="46" r="22" fill="none" stroke="#0044aa" stroke-width="0.5" opacity="0.4"
          stroke-dasharray="3,3">
    <animateTransform attributeName="transform" type="rotate" from="0 50 46" to="360 50 46" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Holographic data bars at bottom -->
  <rect x="25" y="82" width="6" height="10" fill="#00ffcc" opacity="0.35">
    <animate attributeName="height" values="10;16;10" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="82;76;82" dur="1.4s" repeatCount="indefinite"/>
  </rect>
  <rect x="34" y="78" width="6" height="14" fill="#00ccaa" opacity="0.3">
    <animate attributeName="height" values="14;8;14" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="78;84;78" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="43" y="80" width="6" height="12" fill="#00ffcc" opacity="0.35">
    <animate attributeName="height" values="12;20;12" dur="1.1s" repeatCount="indefinite"/>
    <animate attributeName="y" values="80;72;80" dur="1.1s" repeatCount="indefinite"/>
  </rect>
  <rect x="52" y="76" width="6" height="16" fill="#00ccaa" opacity="0.3">
    <animate attributeName="height" values="16;10;16" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="76;82;76" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="61" y="83" width="6" height="9" fill="#00ffcc" opacity="0.35">
    <animate attributeName="height" values="9;15;9" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="y" values="83;77;83" dur="1.6s" repeatCount="indefinite"/>
  </rect>
</svg>
