<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Secret Sakura – cherry blossom -->
  <rect width="64" height="64" fill="#1a0810" rx="8"/>
  <!-- Branch -->
  <path d="M8,56 Q20,44 32,36 Q44,28 56,20" stroke="#6a2045" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M32,36 Q36,24 40,16" stroke="#6a2045" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blossom petals -->
  <g transform="translate(40,16)">
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(0)" opacity="0.9"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff88bb" transform="rotate(72)" opacity="0.85"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(144)" opacity="0.9"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ffaacc" transform="rotate(216)" opacity="0.85"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(288)" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#ffee88"/>
  </g>
  <g transform="translate(56,20)">
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(30)" opacity="0.9"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff88bb" transform="rotate(102)" opacity="0.85"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(174)" opacity="0.9"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ffaacc" transform="rotate(246)" opacity="0.85"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(318)" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffee88"/>
  </g>
  <!-- Falling petals -->
  <ellipse cx="20" cy="20" rx="3" ry="4.5" fill="#ff6699" transform="rotate(30,20,20)" opacity="0.7"/>
  <ellipse cx="48" cy="48" rx="3" ry="4" fill="#ff88bb" transform="rotate(-20,48,48)" opacity="0.6"/>
