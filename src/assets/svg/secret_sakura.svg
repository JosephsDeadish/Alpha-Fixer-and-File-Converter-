<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Secret Sakura – cherry blossom with falling petals -->
  <rect width="64" height="64" fill="#1a0810" rx="8"/>
  <!-- Branch -->
  <path d="M8,56 Q20,44 32,36 Q44,28 56,20" stroke="#6a2045" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M32,36 Q36,24 40,16" stroke="#6a2045" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Main blossom -->
  <g transform="translate(40,16)">
    <animateTransform attributeName="transform" type="rotate"
      values="0 40 16; 5 40 16; -5 40 16; 0 40 16" additive="replace"
      dur="3s" repeatCount="indefinite"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(0)" opacity="0.9"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff88bb" transform="rotate(72)" opacity="0.85"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(144)" opacity="0.9"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ffaacc" transform="rotate(216)" opacity="0.85"/>
    <ellipse cx="0" cy="-8" rx="5" ry="7" fill="#ff6699" transform="rotate(288)" opacity="0.9"/>
    <circle cx="0" cy="0" r="3" fill="#ffee88">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g transform="translate(56,20)">
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(30)" opacity="0.9"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff88bb" transform="rotate(102)" opacity="0.85"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(174)" opacity="0.9"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ffaacc" transform="rotate(246)" opacity="0.85"/>
    <ellipse cx="0" cy="-6" rx="4" ry="5.5" fill="#ff6699" transform="rotate(318)" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.5" fill="#ffee88"/>
  </g>
  <!-- Falling petal 1 -->
  <ellipse cx="20" cy="10" rx="3" ry="4.5" fill="#ff6699" opacity="0.8">
    <animate attributeName="cy" values="10;64;10" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="20;28;20" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Falling petal 2 -->
  <ellipse cx="8" cy="5" rx="2.5" ry="3.5" fill="#ff88bb" opacity="0.7">
    <animate attributeName="cy" values="5;64;5" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="8;16;8" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="5s" begin="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Falling petal 3 -->
  <ellipse cx="48" cy="15" rx="2.8" ry="4" fill="#ffaacc" opacity="0.6">
    <animate attributeName="cy" values="15;64;15" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="48;56;48" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="3.5s" begin="0.8s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Fallen petals on ground -->
  <ellipse cx="20" cy="58" rx="3" ry="4.5" fill="#ff6699" transform="rotate(30,20,58)" opacity="0.5"/>
  <ellipse cx="48" cy="60" rx="3" ry="4" fill="#ff88bb" transform="rotate(-20,48,60)" opacity="0.4"/>
</svg>
