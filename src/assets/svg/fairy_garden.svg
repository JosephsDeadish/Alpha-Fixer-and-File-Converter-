<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fairy Garden – magical wand with sparkles -->
  <rect width="64" height="64" fill="#0d0022" rx="8"/>
  <!-- Magic wand handle -->
  <line x1="12" y1="52" x2="44" y2="20" stroke="#aa66ff" stroke-width="3" stroke-linecap="round"/>
  <!-- Wand tip star -->
  <polygon points="44,8 46,17 56,17 48,23 51,32 44,26 37,32 40,23 32,17 42,17" fill="#dd44ff"/>
  <!-- Glitter sparkles -->
  <circle cx="20" cy="30" r="2" fill="#ffccee" opacity="0.9"/>
  <circle cx="52" cy="42" r="2.5" fill="#ff88ff" opacity="0.8"/>
  <circle cx="14" cy="16" r="1.5" fill="#dd44ff" opacity="0.7"/>
  <circle cx="56" cy="12" r="2" fill="#ffddff" opacity="0.9"/>
  <circle cx="30" cy="52" r="2" fill="#cc66ff" opacity="0.8"/>
  <!-- Small emoji stars -->
  <text x="50" y="58" text-anchor="middle" font-size="10" fill="#dd44ff">✨</text>
  <text x="16" y="48" text-anchor="middle" font-size="8" fill="#ff88ff">💜</text>
  <text x="56" y="34" text-anchor="middle" font-size="8" fill="#ffccee">🌟</text>
</svg>
