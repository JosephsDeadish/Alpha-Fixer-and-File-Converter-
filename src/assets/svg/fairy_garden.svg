<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fairy Garden – fairy with flapping wings and sparkling wand -->
  <rect width="64" height="64" fill="#0d0022" rx="8"/>

  <!-- Twinkling background stars -->
  <circle cx="8"  cy="8"  r="1"   fill="#ffccff" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="56" cy="12" r="1.2" fill="#dd88ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="1.8s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="52" cy="44" r="1"   fill="#ffccff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.7s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="10" cy="50" r="0.8" fill="#cc66ff" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Fairy figure floating up and down -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-3; 0,0" dur="2.5s" repeatCount="indefinite"/>

    <!-- LEFT WING (flapping) -->
    <path d="M28,28 C20,22 14,26 16,32 C18,36 24,34 28,30" fill="#ff88ff" opacity="0.7">
      <animate attributeName="d"
        values="M28,28 C20,22 14,26 16,32 C18,36 24,34 28,30;
                M28,28 C22,20 16,22 17,28 C18,32 24,30 28,27;
                M28,28 C18,24 10,28 13,34 C16,38 24,36 28,31;
                M28,28 C20,22 14,26 16,32 C18,36 24,34 28,30"
        dur="0.6s" repeatCount="indefinite"/>
    </path>
    <!-- RIGHT WING (flapping) -->
    <path d="M36,28 C44,22 50,26 48,32 C46,36 40,34 36,30" fill="#ff88ff" opacity="0.7">
      <animate attributeName="d"
        values="M36,28 C44,22 50,26 48,32 C46,36 40,34 36,30;
                M36,28 C42,20 48,22 47,28 C46,32 40,30 36,27;
                M36,28 C46,24 54,28 51,34 C48,38 40,36 36,31;
                M36,28 C44,22 50,26 48,32 C46,36 40,34 36,30"
        dur="0.6s" repeatCount="indefinite"/>
    </path>

    <!-- Fairy body -->
    <ellipse cx="32" cy="34" rx="5" ry="8" fill="#dd44ff" opacity="0.9"/>
    <!-- Fairy head -->
    <circle cx="32" cy="24" r="6" fill="#ffddee"/>
    <!-- Hair -->
    <path d="M26,22 Q32,16 38,22 Q36,19 32,18 Q28,19 26,22" fill="#cc44cc"/>
    <!-- Eyes -->
    <circle cx="30" cy="24" r="1" fill="#330044"/>
    <circle cx="34" cy="24" r="1" fill="#330044"/>
    <!-- Smile -->
    <path d="M30,27 Q32,29 34,27" stroke="#cc44cc" stroke-width="0.8" fill="none" stroke-linecap="round"/>

    <!-- Wand arm -->
    <line x1="37" y1="30" x2="48" y2="18" stroke="#cc88ff" stroke-width="2" stroke-linecap="round"/>
    <!-- Wand star (pulsing) -->
    <polygon points="48,14 49.5,18 54,18 50.5,21 52,25 48,22 44,25 45.5,21 42,18 46.5,18" fill="#ffaaff">
      <animate attributeName="opacity" values="1;0.4;1" dur="0.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale"
        values="1 1; 1.15 1.15; 1 1" additive="sum" dur="0.9s" repeatCount="indefinite"
        transformOrigin="48 19"/>
    </polygon>
  </g>

  <!-- Sparkle trail from wand -->
  <circle cx="52" cy="30" r="2" fill="#ffccee">
    <animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="r"      values="1;2.5;1" dur="1.3s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="22" r="1.8" fill="#ff88ff">
    <animate attributeName="opacity" values="0;1;0" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="r"      values="0.8;2;0.8" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="42" r="1.5" fill="#dd44ff">
    <animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="r"      values="0.5;2;0.5" dur="1.7s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="6"  cy="28" r="1.5" fill="#ffccee">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom sparkle dots -->
  <circle cx="20" cy="56" r="1.5" fill="#cc66ff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="58" r="1.2" fill="#ff88ff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.6s" begin="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>
