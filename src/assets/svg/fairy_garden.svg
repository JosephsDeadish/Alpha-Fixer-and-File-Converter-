<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fairy Garden – animated sparkle wand badge -->
  <rect width="64" height="64" fill="#0d0022" rx="8"/>

  <!-- Magic wand handle -->
  <line x1="12" y1="52" x2="44" y2="20" stroke="#aa66ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Wand tip star (pulsing glow) -->
  <polygon points="44,8 46,17 56,17 48,23 51,32 44,26 37,32 40,23 32,17 42,17" fill="#dd44ff">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="scale" values="1 1;1.08 1.08;1 1"
      additive="sum" dur="1.2s" repeatCount="indefinite" transformOrigin="44 20"/>
  </polygon>

  <!-- Orbiting sparkle 1 -->
  <circle cx="20" cy="30" r="2.5" fill="#ffccee">
    <animate attributeName="opacity" values="0;1;0" dur="1.4s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1.5;3;1.5" dur="1.4s" begin="0s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting sparkle 2 -->
  <circle cx="52" cy="42" r="2.5" fill="#ff88ff">
    <animate attributeName="opacity" values="0;1;0" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;2.5;1" dur="1.1s" begin="0.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting sparkle 3 -->
  <circle cx="14" cy="16" r="2" fill="#dd44ff">
    <animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="r" values="1;2.5;1" dur="1.7s" begin="0.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting sparkle 4 -->
  <circle cx="56" cy="12" r="2.5" fill="#ffddff">
    <animate attributeName="opacity" values="0;1;0" dur="0.9s" begin="0.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbiting sparkle 5 -->
  <circle cx="30" cy="52" r="2" fill="#cc66ff">
    <animate attributeName="opacity" values="0;1;0" dur="1.3s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Fairy figure (animated float) -->
  <text x="50" y="58" text-anchor="middle" font-size="11" fill="#dd44ff">✨
    <animate attributeName="opacity" values="1;0.3;1" dur="0.8s" repeatCount="indefinite"/>
  </text>
  <text x="16" y="48" text-anchor="middle" font-size="9" fill="#ff88ff">💜
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </text>
  <text x="57" y="34" text-anchor="middle" font-size="9" fill="#ffccee">🌟
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" begin="0.7s" repeatCount="indefinite"/>
  </text>
</svg>
