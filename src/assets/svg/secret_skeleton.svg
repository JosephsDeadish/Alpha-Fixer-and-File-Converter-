<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Secret Skeleton – animated comic skull with chattering teeth and ghostly glow -->
  <rect width="64" height="64" fill="#f0f0f0" rx="8"/>

  <!-- Ghostly aura (outer glow pulse) -->
  <ellipse cx="32" cy="30" rx="27" ry="29" fill="#aa00cc" opacity="0">
    <animate attributeName="opacity" values="0;0.06;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="26;30;26" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Skull oval -->
  <ellipse cx="32" cy="28" rx="20" ry="22" fill="white" stroke="#1a1a1a" stroke-width="1.5">
    <animate attributeName="cy" values="28;27.5;28" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Jaw (slightly chattering) -->
  <rect x="18" y="40" width="28" height="16" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5">
    <animate attributeName="y" values="40;41.5;40;40.5;40" dur="0.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Eye sockets -->
  <ellipse cx="24" cy="24" rx="6" ry="7" fill="#1a1a1a">
    <animate attributeName="cy" values="24;23.5;24" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="40" cy="24" rx="6" ry="7" fill="#1a1a1a">
    <animate attributeName="cy" values="24;23.5;24" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eye glow (pulsing purple) -->
  <ellipse cx="24" cy="24" rx="4" ry="5" fill="#8800aa" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="24;23.5;24" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="40" cy="24" rx="4" ry="5" fill="#8800aa" opacity="0">
    <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" begin="0.4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="24;23.5;24" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Eye shine -->
  <circle cx="25" cy="22" r="1.5" fill="white">
    <animate attributeName="cy" values="22;21.5;22" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="41" cy="22" r="1.5" fill="white">
    <animate attributeName="cy" values="22;21.5;22" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Nose hole -->
  <ellipse cx="32" cy="34" rx="3" ry="2" fill="#1a1a1a">
    <animate attributeName="cy" values="34;33.5;34" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Teeth (upper, fixed to skull) -->
  <rect x="20" y="40" width="5" height="7" rx="1" fill="#1a1a1a">
    <animate attributeName="y" values="40;39.5;40" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="27" y="40" width="5" height="7" rx="1" fill="#1a1a1a">
    <animate attributeName="y" values="40;39.5;40" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="34" y="40" width="5" height="7" rx="1" fill="#1a1a1a">
    <animate attributeName="y" values="40;39.5;40" dur="2.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Crack line for character -->
  <path d="M32,6 Q30,14 33,20" stroke="#cccccc" stroke-width="1" fill="none">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Floating spooky sparkles (bone dust) -->
  <circle cx="6"  cy="6"  r="1.5" fill="#8800aa" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="6;3;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="58" cy="10" r="1.2" fill="#aa00cc" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="10;7;10" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="8"  cy="56" r="1"   fill="#8800aa" opacity="0">
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="56;53;56" dur="3s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="54" r="1.3" fill="#cc00ff" opacity="0">
    <animate attributeName="opacity" values="0;0.4;0" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="54;51;54" dur="2.2s" begin="1.0s" repeatCount="indefinite"/>
  </circle>
</svg>
