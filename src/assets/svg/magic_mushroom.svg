<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <!-- Magic Mushroom: forest floor, glowing mushrooms, floating spores -->
  <defs>
    <radialGradient id="bg_mm" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0f1a08"/>
      <stop offset="100%" stop-color="#060e04"/>
    </radialGradient>
    <radialGradient id="glow_mm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#88ff44" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#33aa00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_pur" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#660099" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow_pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff44aa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#aa0055" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="220" fill="url(#bg_mm)"/>

  <!-- Stars / spores in sky -->
  <circle cx="40"  cy="20" r="1.5" fill="#88ff44" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="130" cy="35" r="1"   fill="#cc44ff" opacity="0.8"><animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s"   repeatCount="indefinite"/></circle>
  <circle cx="220" cy="18" r="1.5" fill="#88ff44" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s"   repeatCount="indefinite"/></circle>
  <circle cx="310" cy="30" r="1"   fill="#ff44aa" opacity="0.75"><animate attributeName="opacity" values="0.75;0.25;0.75" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="22" r="1.5" fill="#cc44ff" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.8s" repeatCount="indefinite"/></circle>

  <!-- Mushroom 1 (large, red spotted) -->
  <!-- Glow -->
  <ellipse cx="100" cy="145" rx="55" ry="40" fill="url(#glow_mm)" opacity="0.5">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Cap -->
  <ellipse cx="100" cy="115" rx="50" ry="35" fill="#cc2222"/>
  <path d="M 55,125 Q 100,60 145,125 Z" fill="#dd3333"/>
  <!-- Spots -->
  <circle cx="80"  cy="105" r="8"  fill="#ffffff" opacity="0.85"/>
  <circle cx="115" cy="98"  r="7"  fill="#ffffff" opacity="0.85"/>
  <circle cx="95"  cy="90"  r="5"  fill="#ffffff" opacity="0.8"/>
  <circle cx="70"  cy="120" r="5"  fill="#ffffff" opacity="0.7"/>
  <circle cx="125" cy="118" r="6"  fill="#ffffff" opacity="0.75"/>
  <!-- Stem -->
  <rect x="85" y="140" width="30" height="52" rx="10" fill="#eeeecc"/>
  <rect x="90" y="152" width="20" height="3"  rx="1.5" fill="#ccccaa" opacity="0.6"/>
  <rect x="88" y="162" width="24" height="3"  rx="1.5" fill="#ccccaa" opacity="0.5"/>
  <!-- Skirt -->
  <ellipse cx="100" cy="150" rx="26" ry="7" fill="#ddddbb" opacity="0.7"/>

  <!-- Mushroom 2 (medium, purple) -->
  <ellipse cx="270" cy="150" rx="40" ry="30" fill="url(#glow_pur)" opacity="0.5">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <path d="M 235,135 Q 270,80 305,135 Z" fill="#8822cc"/>
  <ellipse cx="270" cy="130" rx="38" ry="28" fill="#9933dd"/>
  <circle cx="255" cy="122" r="6" fill="#ffffff" opacity="0.7"/>
  <circle cx="278" cy="115" r="5" fill="#ffffff" opacity="0.75"/>
  <circle cx="266" cy="108" r="4" fill="#ffffff" opacity="0.65"/>
  <rect x="258" y="148" width="24" height="44" rx="8" fill="#ddccee"/>
  <ellipse cx="270" cy="155" rx="20" ry="5" fill="#ccbbdd" opacity="0.7"/>

  <!-- Mushroom 3 (small, pink) -->
  <ellipse cx="190" cy="170" rx="28" ry="22" fill="url(#glow_pink)" opacity="0.5">
    <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3.2s" repeatCount="indefinite"/>
  </ellipse>
  <path d="M 163,160 Q 190,115 217,160 Z" fill="#ee4488"/>
  <ellipse cx="190" cy="158" rx="27" ry="20" fill="#ff5599"/>
  <circle cx="178" cy="152" r="4" fill="#ffffff" opacity="0.7"/>
  <circle cx="197" cy="147" r="3" fill="#ffffff" opacity="0.7"/>
  <rect x="183" y="168" width="14" height="36" rx="5" fill="#ffddee"/>
  <ellipse cx="190" cy="174" rx="12" ry="4" fill="#ffccdd" opacity="0.7"/>

  <!-- Floating glowing spores -->
  <circle cx="60"  cy="90"  r="3" fill="#88ff44" opacity="0.8">
    <animate attributeName="cy" values="90;50;90" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="60;75;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="70"  r="2.5" fill="#cc44ff" opacity="0.8">
    <animate attributeName="cy" values="70;30;70" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="150;165;150" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.85;0" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="80"  r="2.5" fill="#88ff44" opacity="0.7">
    <animate attributeName="cy" values="80;40;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="320;308;320" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="100" r="2"   fill="#ff44aa" opacity="0.75">
    <animate attributeName="cy" values="100;55;100" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Forest floor -->
  <path d="M 0,196 Q 80,182 160,198 Q 240,214 320,196 Q 360,186 400,198 L 400,220 L 0,220 Z" fill="#0d1a07"/>
  <!-- Moss patches -->
  <ellipse cx="140" cy="210" rx="30" ry="6" fill="#2a5510" opacity="0.7"/>
  <ellipse cx="300" cy="208" rx="25" ry="5" fill="#2a5510" opacity="0.65"/>
</svg>
