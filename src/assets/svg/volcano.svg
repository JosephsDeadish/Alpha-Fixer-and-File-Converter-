<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#1a0800" rx="8"/>
  <!-- Volcano mountain -->
  <polygon points="32,4 8,60 56,60" fill="#3a1800" stroke="#ff4400" stroke-width="1"/>
  <!-- Lava glow at crater (pulsing) -->
  <ellipse cx="32" cy="8" rx="8" ry="4" fill="#ff4400">
    <animate attributeName="opacity" values="0.9;1;0.7;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="8;9;7;8" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Lava eruption blobs -->
  <circle cx="32" cy="8" r="3" fill="#ff8800" opacity="0.9">
    <animate attributeName="cy" values="8;2;8" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="28" cy="8" r="2" fill="#ffcc00" opacity="0.8">
    <animate attributeName="cy" values="8;0;8" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="28;25;28" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="8" r="2.5" fill="#ff6600" opacity="0.7">
    <animate attributeName="cy" values="8;1;8" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="36;39;36" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Lava flow streams (flowing) -->
  <path d="M28,10 Q24,30 22,50" stroke="#ff6600" stroke-width="3" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.5;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M36,10 Q40,35 38,55" stroke="#ff4400" stroke-width="2.5" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.7;0.5" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <!-- Floating embers -->
  <circle cx="20" cy="20" r="2" fill="#ff8800">
    <animate attributeName="cy" values="20;8;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="16" r="1.5" fill="#ffcc00">
    <animate attributeName="cy" values="16;4;16" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="15" cy="35" r="1.5" fill="#ff4400">
    <animate attributeName="cy" values="35;22;35" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="30" r="2" fill="#ff6600">
    <animate attributeName="cy" values="30;18;30" dur="2.1s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.1s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Hot lava pool at base (rippling) -->
  <ellipse cx="32" cy="58" rx="20" ry="4" fill="#ff4400" opacity="0.6">
    <animate attributeName="rx" values="20;22;20" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
</svg>
