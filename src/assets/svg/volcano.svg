<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#1a0800" rx="8"/>
  <!-- Volcano mountain -->
  <polygon points="32,6 8,60 56,60" fill="#3a1800" stroke="#ff4400" stroke-width="1"/>
  <!-- Eruption smoke column rising from crater -->
  <ellipse cx="32" cy="4" rx="5" ry="3" fill="#882200" opacity="0.7">
    <animate attributeName="ry" values="3;6;3" dur="0.9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="0.9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="32" cy="-5" rx="8" ry="5" fill="#661100" opacity="0.4">
    <animate attributeName="cy" values="-5;-12;-5" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="8;11;8" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="1.4s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Lava glow at crater (pulsing) -->
  <ellipse cx="32" cy="8" rx="8" ry="4" fill="#ff4400">
    <animate attributeName="opacity" values="0.9;1;0.7;1;0.9" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="8;9;7;8" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Main eruption blobs – fly high above the crater -->
  <circle cx="32" cy="8" r="4" fill="#ff8800">
    <animate attributeName="cy" values="8;-28;8" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;1.5;4" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="29" cy="8" r="2.5" fill="#ffcc00">
    <animate attributeName="cy" values="8;-24;8" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="29;22;29" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="r" values="2.5;1;2.5" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="1.3s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="8" r="3" fill="#ff6600">
    <animate attributeName="cy" values="8;-26;8" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="35;42;35" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="3;1;3" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="0.9s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="31" cy="8" r="2" fill="#ffaa00">
    <animate attributeName="cy" values="8;-20;8" dur="1.1s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="31;25;31" dur="1.1s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.1s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="33" cy="8" r="2" fill="#ff4400">
    <animate attributeName="cy" values="8;-18;8" dur="0.8s" begin="0.35s" repeatCount="indefinite"/>
    <animate attributeName="cx" values="33;38;33" dur="0.8s" begin="0.35s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="0.8s" begin="0.35s" repeatCount="indefinite"/>
  </circle>
  <!-- Lava bombs arcing left and right and falling back down -->
  <circle r="2.5" fill="#ff6600">
    <animate attributeName="cx" values="32;16;16" dur="1.5s" begin="0.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="8;14;42" dur="1.5s" begin="0.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.9;0" dur="1.5s" begin="0.1s" repeatCount="indefinite"/>
  </circle>
  <circle r="2" fill="#ffaa00">
    <animate attributeName="cx" values="32;48;50" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="8;16;38" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.9;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle r="1.8" fill="#ff4400">
    <animate attributeName="cx" values="32;12;10" dur="2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="8;20;50" dur="2s" begin="1.1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;0" dur="2s" begin="1.1s" repeatCount="indefinite"/>
  </circle>
  <!-- Lava flow streams down the sides -->
  <path d="M28,10 Q24,30 22,50" stroke="#ff6600" stroke-width="3" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.7;1;0.5;0.7" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M36,10 Q40,35 38,55" stroke="#ff4400" stroke-width="2.5" fill="none" opacity="0.7">
    <animate attributeName="opacity" values="0.5;0.9;0.7;0.5" dur="2.3s" begin="0.4s" repeatCount="indefinite"/>
  </path>
  <!-- Floating embers rising from flows -->
  <circle cx="20" cy="20" r="2" fill="#ff8800">
    <animate attributeName="cy" values="20;6;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="16" r="1.5" fill="#ffcc00">
    <animate attributeName="cy" values="16;2;16" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.7s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="13" cy="34" r="1.5" fill="#ff4400">
    <animate attributeName="cy" values="34;20;34" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.5s" begin="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="51" cy="28" r="2" fill="#ff6600">
    <animate attributeName="cy" values="28;14;28" dur="2.1s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="2.1s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Hot lava pool at base (rippling) -->
  <ellipse cx="32" cy="58" rx="20" ry="4" fill="#ff4400" opacity="0.6">
    <animate attributeName="rx" values="20;22;20" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="1.8s" repeatCount="indefinite"/>
  </ellipse>
</svg>
