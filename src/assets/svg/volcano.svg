<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#1a0800" rx="8"/>
  <!-- Volcano mountain -->
  <polygon points="32,4 8,60 56,60" fill="#3a1800" stroke="#ff4400" stroke-width="1"/>
  <!-- Lava glow at crater -->
  <ellipse cx="32" cy="8" rx="8" ry="4" fill="#ff4400" opacity="0.9"/>
  <!-- Lava flow streams -->
  <path d="M28,10 Q24,30 22,50" stroke="#ff6600" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M36,10 Q40,35 38,55" stroke="#ff4400" stroke-width="2.5" fill="none" opacity="0.7"/>
  <!-- Embers -->
  <circle cx="20" cy="20" r="2" fill="#ff8800" opacity="0.8"/>
  <circle cx="44" cy="16" r="1.5" fill="#ffcc00" opacity="0.9"/>
  <circle cx="15" cy="35" r="1.5" fill="#ff4400" opacity="0.6"/>
  <circle cx="50" cy="30" r="2" fill="#ff6600" opacity="0.7"/>
  <!-- Hot lava pool at base -->
  <ellipse cx="32" cy="58" rx="20" ry="4" fill="#ff4400" opacity="0.6"/>
</svg>
